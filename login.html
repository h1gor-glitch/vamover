<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Organize seus estudos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    
    
    
    <link rel="stylesheet" href="style.css">
    
    
    <div class="particles" id="particles"></div>
    
    <div class="login-container">
        <div class="brand">
            <div class="brand-icon">
                <i class="fas fa-book-open" style="font-size: 28px; color: white;"></i>
            </div>
            <h1>Organize seus estudos</h1>
            <p>Bem-vindo! Este espaço foi criado para oferecer uma experiência simples, útil e agradável.</p>
        </div>

        <div id="errorMessage" class="message error-message">
            <i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i>
            Email ou senha incorretos
        </div>
        
        <div id="successMessage" class="message success-message">
            <i class="fas fa-check-circle" style="margin-right: 8px;"></i>
            Login realizado com sucesso!
        </div>

        <form id="loginForm">
            <div class="form-group">
                <i class="fas fa-envelope form-icon"></i>
                <input type="email" id="email" name="email" required>
                <label>Email</label>
            </div>

            <div class="form-group">
                <i class="fas fa-lock form-icon"></i>
                <input type="password" id="password" name="password" required minlength="6">
                <label>Senha</label>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-arrow-right" style="margin-right: 12px;"></i>
                Entrar
            </button>
        </form>

        <div class="forgot-password">
            <a href="#" id="forgotPassword">
                <i class="fas fa-key"></i>
                Esqueceu a senha?
            </a>
        </div>

        <div class="divider">
            <span>ou</span>
        </div>

        <button type="button" class="create-account" id="createAccount">
            <i class="fas fa-user-plus" style="margin-right: 12px;"></i>
            Criar nova conta
        </button>
    </div>

    <script>
        function createParticles() {
            const particles = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = particle.style.height = (Math.random() * 6 + 2) + 'px';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                particles.appendChild(particle);
            }
        }

        function showMessage(el, text, timeout = 4000) {
            el.innerHTML = text;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', timeout);
        }

        document.getElementById('loginForm').addEventListener('submit', e => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            showMessage(document.getElementById('successMessage'), 
                '<i class="fas fa-check-circle" style="margin-right: 8px;"></i>Login realizado com sucesso!');
            setTimeout(() => {
                console.log('Login:', email);
                window.location.href = 'dashboard.html'; // ✅ CORREÇÃO AQUI
            }, 1500);
        });

        document.getElementById('forgotPassword').addEventListener('click', e => {
            e.preventDefault();
            showMessage(document.getElementById('successMessage'), 
                '<i class="fas fa-paper-plane" style="margin-right: 8px;"></i>Link enviado para seu email!');
        });

        document.getElementById('createAccount').addEventListener('click', () => {
            console.log('Criar conta');
        });

        createParticles();
    </script>

</body>
</html>
