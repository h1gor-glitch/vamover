<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #000000, #093c76);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* Caixa principal - COMPACTA */
.container {
    background: #ffffff; /* BRANCO PURO */
    padding: 40px 35px; /* MENOR padding */
    border-radius: 20px;
    width: 100%;
    max-width: 420px; /* MENOR largura */
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    animation: slideUp 1s ease-out;
    position: relative;
    border: 1px solid rgba(255,255,255,0.2);
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h2 {
    text-align: center;
    margin-bottom: 30px; /* MENOR espaço */
    color: #333;
    font-size: 28px; /* MENOR título */
    font-weight: bold;
}

/* Inputs - MENORES */
.input-group {
    margin-bottom: 20px; /* MENOR espaço */
}

.input-group label {
    font-size: 15px; /* MENOR label */
    color: #555;
    font-weight: 600;
    display: block;
    margin-bottom: 8px; /* MENOR espaço */
}

.input-group input {
    width: 100%;
    padding: 15px 20px; /* MENOR padding */
    border-radius: 12px;
    border: 2px solid #e0e0e0;
    outline: none;
    transition: all 0.3s ease;
    font-size: 16px; /* MENOR fonte */
    height: 50px; /* MENOR altura */
}

.input-group input:focus {
    border-color: #144ebc;
    box-shadow: 0 0 15px rgba(20, 78, 188, 0.2);
    transform: translateY(-2px);
    background: linear-gradient(145deg, #fafafa, white);
}

/* Botão - MENOR */
button {
    width: 100%;
    padding: 16px; /* MENOR padding */
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #144ebc, #00c8ff);
    color: white;
    font-size: 17px; /* MENOR fonte */
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    height: 55px; /* MENOR altura */
    text-transform: uppercase;
    letter-spacing: 0.8px;
    box-shadow: 0 8px 25px rgba(20, 78, 188, 0.4);
    position: relative;
    overflow: hidden;
    margin-top: 8px; /* MENOR margem */
}

button::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    transition: all 0.5s ease;
    transform: translate(-50%, -50%);
}

button:hover::before {
    width: 250px;
    height: 250px;
}

button:hover {
    background: linear-gradient(135deg, #00c8ff, #144ebc);
    transform: translateY(-4px);
    box-shadow: 0 12px 35px rgba(0, 200, 255, 0.5);
}

button:active {
    transform: translateY(-1px);
}

/* RESPONSIVO */
@media (max-width: 500px) {
    .container {
        padding: 35px 30px;
        margin: 20px;
        max-width: none;
    }
    
    h2 { 
        font-size: 26px;
        margin-bottom: 25px;
    }
    
    .input-group input {
        padding: 14px 18px;
        height: 48px;
        font-size: 16px;
    }
    
    button {
        padding: 15px;
        height: 52px;
        font-size: 16px;
    }
}

@media (max-width: 400px) {
    body {
        padding: 10px;
        align-items: flex-start;
        padding-top: 30px;
    }
    
    .container { 
        padding: 30px 25px; 
        border-radius: 15px;
    }
    
    h2 { 
        font-size: 24px; 
        margin-bottom: 20px; 
    }
}
</style>

</head>

<body>
<div class="container">
    <h2>Criar Conta</h2>

    <form>
        <div class="input-group">
            <label>Nome Completo</label>
            <input type="text" placeholder="Digite seu nome completo" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Digite seu email" required>
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" placeholder="Crie uma senha forte" required>
        </div>

        <div class="input-group">
            <label>Confirmar Senha</label>
            <input type="password" placeholder="Confirme sua senha" required>
        </div>

        <button type="submit">CADASTRAR</button>
    </form>
</div>

</body>
</html>
