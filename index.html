<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tela de Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#e5e5e5;
}

.container{
    width:90%;
    max-width:1100px;
    height:640px;
    background:#fff;
    margin:30px auto;
    border-radius:8px;
    overflow:hidden;
}

.topo{
    width:100%;
    height:45px;
    background:#b80000;
}

.conteudo{
    display:flex;
    justify-content:space-around;
    align-items:center;
    height:calc(100% - 45px);
    padding:30px;
}

.esquerda{
    width:45%;
}

.esquerda h1{
    color:#b80000;
    font-size:58px;
    margin-bottom:10px;
}

.esquerda p{
    color:#8b0000;
    font-size:22px;
    margin-bottom:40px;
}

.esquerda img{
    width:320px;
    display:block;
    margin:auto;
}

.login-box{
    width:360px;
    background:#b80000;
    padding:40px 30px;
    border-radius:20px;
    color:#fff;
}

.login-box h2{
    text-align:center;
    font-size:48px;
    margin-bottom:35px;
}

.login-box label{
    display:block;
    margin-bottom:8px;
    font-size:22px;
}

.campo{
    position:relative;
    margin-bottom:20px;
}

.campo input{
    width:100%;
    padding:16px 60px 16px 16px;
    border:none;
    border-radius:6px;
    font-size:18px;
}

.toggle{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:#8b0000;
    font-weight:bold;
    cursor:pointer;
    font-size:14px;
}

.login-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:35px;
    background:#fff;
    color:#8b0000;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    display:block;
    color:#fff;
    text-decoration:none;
    margin-top:10px;
}

.links a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>
    <link rel="stylesheet" href="style.css">

<div class="container">
    <div class="topo"></div>

    <div class="conteudo">

        <div class="esquerda">
            <h1>Faça login</h1>
            <p>para acessar a plataforma</p>
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
        </div>

        <div class="login-box">
            <h2>LOGIN</h2>

            <label>Email</label>
            <div class="campo">
                <input type="password" id="email" placeholder="email">
                <button class="toggle" onclick="mostrar('email', this)">VER</button>
            </div>

            <label>Senha</label>
            <div class="campo">
                <input type="password" id="senha" placeholder="senha">
                <button class="toggle" onclick="mostrar('senha', this)">VER</button>
            </div>

            <button class="login-btn">LOGIN</button>

            <div class="links">
                <a href="#" id="criarConta">Criar Conta</a>
                <a href="#" id="esqueceuSenha">Esqueceu a Senha?</a>
            </div>
        </div>

    </div>
</div>

<script>
function mostrar(id, botao){
    let campo = document.getElementById(id);

    // bota de mostrar ou ocultar a senha (type="password" ou type="text")
    if(campo.type === "password"){  
        campo.type = "text";
        botao.innerHTML = "OCULTAR";
    }else{
        campo.type = "password";
        botao.innerHTML = "VER";
    }
}
</script>

<script src="script.js"></script>
</body>
</html>
